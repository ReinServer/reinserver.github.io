<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReinServer | ReinServers</title>
<link rel="icon" href="https://reinserver.com/reinserver.ico" type="image/x-icon">
<style>
  body {
    font-family: Helvetica, sans-serif;
    text-align: center;
    background-color: black;
    color: white;
    line-height: 1.2;
    padding: 40px 20px;
  }
  h2 {
    font-size: 42px;
    margin-top: 50px;
    margin-bottom: 20px;
  }
  p {
    max-width: 800px;
    margin: 0 auto 20px;
    font-size: 20px;
    line-height: 1.5;
  }
  a {
    color: white;
    text-decoration: underline;
    font-size: 18px;
  }
  .button {
    display: inline-block;
    padding: 10px 20px;
    background-color: black;
    color: white;
    border: 2px solid white;
    cursor: pointer;
    text-decoration: none;
    margin-top: 30px;
  }
  @media (max-width: 600px) {
    h2 {
      font-size: 28px;
    }

    p {
      font-size: 18px;
    }
  }
</style>
</head>
<body>
  <h2>Thank you for supporting ReinServer</h2>
  <p>Since 13 April 2026, ReinServer has officially been sunsetted. All server-related data has been archived and the webstore has been shut down.<br>Thank you for 3 years of ReinServer.</p>
  <p><a href="https://reinserver.com/goodbye.html">read shutdown notice</a></p>
  <button class="button" onclick="goback()">go back</button>

<script>
  if (window.location.protocol === 'http:') {
    window.location.href = 'https://reinserver.com/servers';
  }

  function goback() {
    window.location.href = 'https://reinserver.com';
  }
</script>
</body>
</html>
